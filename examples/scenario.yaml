##
## Example Kyara scenario — browse Wikipedia pages
##
## This scenario simulates a user navigating through several Wikipedia pages,
## generating Prometheus metrics (HTTP request/response counts, timings,
## resource usage) that can then be analysed by hikaku.
##

scenarios:
  - name: wikipedia-browse
    location: https://en.wikipedia.org/wiki/Software_performance_testing
    workers: 1
    iterations: 1
    steps:
      # Wait for the article to fully load
      - wait: 3

      # Navigate to a linked article
      - navigate: https://en.wikipedia.org/wiki/Load_testing

      # Wait for the second article to load
      - wait: 3
